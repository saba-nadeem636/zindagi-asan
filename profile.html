<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Provider Profile</title>

<style>
    .header{
    width:100%;
    background:white;
    padding:18px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}


/* Logo */

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}


.logo img{
    width:45px;
    height:45px;
    border-radius:50%;
    object-fit:cover;
}


.logo h2{
    color:#6c5ce7;
    font-size:25px;
}


/* Navigation */

.header nav a{
    text-decoration:none;
    color:#333;
    margin-left:25px;
    font-size:16px;
    font-weight:500;
}


.header nav a:hover{
    color:#6c5ce7;
}
    .profile-section{
    padding:50px;
    display:flex;
    justify-content:center;
}


.profile-card{
    background:white;
    width:350px;
    text-align:center;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}


.profile-card img{
    width:120px;
    height:120px;
    border-radius:50%;
}


.profile-card h1{
    margin:15px;
    color:#6c5ce7;
}


.profile-card p{
    margin:10px;
    color:#555;
}


.description{
    line-height:1.5;
}


.contact-btn,
.booking-btn{

    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:25px;
    color:white;
    background:#00a151;
    cursor:pointer;

}


.contact-btn:hover,
.booking-btn:hover{
    background:#4834d4;
}
</style>
</head>

<body>


<header class="header">

    <h2>Zindagi Asan</h2>

    <nav>
        <a href="welcome.html">Home</a>
        <a href="services.html">Services</a>
    </nav>

</header>
<header class="header">

    <div class="logo">
        <img src="logo.png" alt="Logo">
        <h2>Zindagi<span style="color: #FFD54F;">Asan</span></h2>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="profile.html">Profile</a>
    </nav>

</header>



<section class="profile-section">


    <div class="profile-card">

        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" 
        alt="Profile Image">


        <h1>Ayesha</h1>

        <h3>💄 Makeup Artist</h3>


        <p>📍 Location: Karachi</p>

        <p>⭐ Rating: 4.8 / 5</p>

        <p>💼 Experience: 3 Years</p>


        <p class="description">
        Professional makeup artist providing bridal,
        party and event makeup services.
        </p>


        <button class="contact-btn">
            Contact Now
        </button>


        <button class="booking-btn">
            Book Service
        </button>


    </div>


</section>
<script>
    const contactBtn = document.querySelector(".contact-btn");
const bookingBtn = document.querySelector(".booking-btn");


if(contactBtn){

    contactBtn.addEventListener("click", function(){

        alert("Contact option will be available soon!");

    });

}



if(bookingBtn){

    bookingBtn.addEventListener("click", function(){

        alert("Your service booking request has been sent!");

    });

}
</script>


</body>
</html>
