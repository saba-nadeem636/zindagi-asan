<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Notifications</title>

<style>
    /* =========================
   NOTIFICATIONS CSS
========================= */


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    background:#f5f7fb;

}



/* Header */

header{

    height:70px;

    background:#2a9085;

    color:white;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 50px;

}



.logo{

    font-size:28px;

    font-weight:bold;

}



header a{

    color:white;

    text-decoration:none;

    font-size:16px;

}


header a:hover{

    color:#ffe082;

}




/* Notification Page */


.notification-page{

    width:80%;

    margin:50px auto;

}



.notification-page h1{

    font-size:35px;

    color:#333;

    margin-bottom:10px;

}



.notification-page > p{

    color:#777;

    margin-bottom:30px;

}




/* Notification Box */


.notification-box{

    background:white;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,0.1);

    overflow:hidden;

}




/* Notification Item */


.notification-item{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:25px 30px;

    border-bottom:1px solid #eee;

}



.notification-item h3{

    color:#333;

    margin-bottom:8px;

}



.notification-item p{

    color:#777;

    font-size:14px;

}




/* Toggle Switch */


.switch{

    position:relative;

    width:55px;

    height:28px;

}



.switch input{

    opacity:0;

    width:0;

    height:0;

}



.slider{

    position:absolute;

    top:0;

    left:0;

    right:0;

    bottom:0;

    background:#ccc;

    border-radius:30px;

    cursor:pointer;

}



.slider:before{

    content:"";

    position:absolute;

    height:22px;

    width:22px;

    left:3px;

    bottom:3px;

    background:white;

    border-radius:50%;

    transition:0.3s;

}



.switch input:checked + .slider{

    background:#2a9085;

}



.switch input:checked + .slider:before{

    transform:translateX(27px);

}




/* Mobile */

@media(max-width:600px){


    .notification-page{

        width:90%;

    }


    header{

        padding:0 20px;

    }


    .notification-item{

        padding:20px;

    }

}
</style>
</head>


<body>


<header>

    <div class="logo">
        Zindagi <span style="color: #FFD54F;">Asan</span>
    </div>


    <a href="provider-setting.html">
        ← Back
    </a>

</header>




<section class="notification-page">


    <h1>Notifications</h1>

    <p>
        Manage your notification preferences
    </p>




    <div class="notification-box">



        <div class="notification-item">

            <div>
                <h3>Booking Notifications</h3>

                <p>
                    Get alerts when a new booking arrives
                </p>
            </div>


            <label class="switch">

                <input type="checkbox" checked id="booking">

                <span class="slider"></span>

            </label>

        </div>





        <div class="notification-item">

            <div>
                <h3>Customer Messages</h3>

                <p>
                    Receive messages from customers
                </p>
            </div>


            <label class="switch">

                <input type="checkbox" checked id="message">

                <span class="slider"></span>

            </label>

        </div>





        <div class="notification-item">

            <div>
                <h3>Payment Alerts</h3>

                <p>
                    Get payment related updates
                </p>
            </div>


            <label class="switch">

                <input type="checkbox" checked id="payment">

                <span class="slider"></span>

            </label>

        </div>




    </div>


</section>




<script>
/* =========================
   NOTIFICATIONS JS
========================= */


let booking = document.getElementById("booking");

let message = document.getElementById("message");

let payment = document.getElementById("payment");




// Booking Notification

booking.addEventListener("change", function(){

    if(this.checked){

        alert("Booking notifications enabled");

    }

    else{

        alert("Booking notifications disabled");

    }

});




// Customer Message Notification

message.addEventListener("change", function(){

    if(this.checked){

        alert("Message notifications enabled");

    }

    else{

        alert("Message notifications disabled");

    }

});




// Payment Notification

payment.addEventListener("change", function(){

    if(this.checked){

        alert("Payment notifications enabled");

    }

    else{

        alert("Payment notifications disabled");

    }

});
</script>


</body>

</html>
