<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Change Password</title>

    <style>
        /* =========================
   CHANGE PASSWORD CSS
========================= */


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    background:#f5f7fb;

}



/* Header */

header{

    height:70px;

    background:#2a9085;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 50px;

    color:white;

}



.logo{

    font-size:28px;
    font-weight:bold;

}



header a{

    color:white;

    text-decoration:none;

    font-size:16px;

}



header a:hover{

    color:#ffe082;

}




/* Password Page */


.password-page{

    width:100%;

    min-height:80vh;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

}



.password-page h1{

    font-size:35px;

    color:#333;

    margin-bottom:10px;

}



.password-page p{

    color:#777;

    margin-bottom:30px;

}





/* Password Box */


.password-box{

    width:400px;

    background:white;

    padding:35px;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,0.1);

}




.password-box label{

    display:block;

    margin-top:15px;

    color:#333;

    font-size:15px;

}



.password-box input{

    width:100%;

    padding:12px;

    margin-top:8px;

    border:1px solid #ddd;

    border-radius:8px;

    outline:none;

}




.password-box input:focus{

    border-color:#2a9085;

}




/* Button */


.password-box button{

    width:100%;

    margin-top:25px;

    padding:12px;

    border:none;

    border-radius:25px;

    background:#2a9085;

    color:white;

    font-size:16px;

    cursor:pointer;

}



.password-box button:hover{

    background:#21756d;

}




/* Mobile */

@media(max-width:500px){

    .password-box{

        width:90%;

    }


    header{

        padding:0 20px;

    }

}
    </style>
</head>


<body>


<header>

    <div class="logo">
        Zindagi <span style="color: #FFD54F;">Asan</span>
    </div>

    <a href="provider-setting.html">
        ← Back
    </a>

</header>



<section class="password-page">


    <h1>Change Password</h1>

    <p>
        Update your account password
    </p>



    <div class="password-box">


        <label>
            Current Password
        </label>

        <input 
        type="password" 
        id="currentPassword"
        placeholder="Enter current password">



        <label>
            New Password
        </label>

        <input 
        type="password"
        id="newPassword"
        placeholder="Enter new password">



        <label>
            Confirm New Password
        </label>

        <input 
        type="password"
        id="confirmPassword"
        placeholder="Confirm new password">



        <button id="updateBtn">
            Update Password
        </button>


    </div>


</section>



<script >
/* =========================
   CHANGE PASSWORD JS
========================= */


let updateBtn = document.getElementById("updateBtn");


updateBtn.addEventListener("click", function(){


    let currentPassword = document.getElementById("currentPassword").value;

    let newPassword = document.getElementById("newPassword").value;

    let confirmPassword = document.getElementById("confirmPassword").value;



    if(currentPassword === "" || newPassword === "" || confirmPassword === ""){

        alert("Please fill all fields");

    }


    else if(newPassword !== confirmPassword){

        alert("New password and confirm password do not match");

    }


    else{

        alert("Password changed successfully!");

        window.location.href = "provider-setting.html";

    }


});
</script>


</body>

</html>
