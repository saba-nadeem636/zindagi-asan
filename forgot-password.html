<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | Zindagi Asan</title>
<style>
    /*=========================================
      ZINDAGI ASAN
      FORGOT PASSWORD PAGE
=========================================*/

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
}

/*=========================
Main Section
=========================*/

.forgot-page{

    width:100%;
    min-height:100vh;

    display:grid;
    grid-template-columns:1fr 1fr;

}

/*=========================
Left Side
=========================*/

.forgot-left{

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#0F9D58,#1565C0);

    color:#fff;

    padding:60px;

    position:relative;

    overflow:hidden;

}

.forgot-left::before{

    content:"";

    width:300px;
    height:300px;

    background:rgba(255,255,255,.12);

    position:absolute;

    top:-100px;
    left:-100px;

    border-radius:50%;

}

.forgot-left::after{

    content:"";

    width:250px;
    height:250px;

    background:rgba(255,255,255,.08);

    position:absolute;

    bottom:-80px;
    right:-80px;

    border-radius:50%;

}

.left-content{

    position:relative;

    z-index:2;

    text-align:center;

}

.left-content h1{

    font-size:55px;

    margin-bottom:15px;

}

.left-content span{

    color:#FFD54F;

}

.left-content h2{

    font-size:36px;

    margin-bottom:20px;

}

.left-content p{

    font-size:18px;

    line-height:30px;

}

/*=========================
Right Side
=========================*/

.forgot-right{

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px;

}

.forgot-form{

    width:100%;
    max-width:500px;

    background:#fff;

    padding:40px;

    border-radius:20px;

    box-shadow:0 15px 40px rgba(0,0,0,.08);

}

.back-btn{

    text-decoration:none;

    color:#1565C0;

    font-weight:600;

}

.forgot-form h2{

    margin-top:20px;

    font-size:34px;

    color:#222;

}

.forgot-text{

    color:#666;

    margin:15px 0 30px;

}

/*=========================
Input Fields
=========================*/

.input-box{

    margin-bottom:20px;

}

.input-box label{

    display:block;

    margin-bottom:8px;

    font-weight:600;

    color:#333;

}

.input-field{

    display:flex;

    align-items:center;

    border:1px solid #ddd;

    border-radius:10px;

    overflow:hidden;

    background:#fff;

}

.input-field i{

    padding:15px;

    color:#666;

}

.input-field input{

    width:100%;

    border:none;

    outline:none;

    padding:15px;

    font-size:16px;

}

/*=========================
Reset Button
=========================*/

.reset-btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:50px;

    background:#0F9D58;

    color:#fff;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

.reset-btn:hover{

    background:#087844;

    transform:translateY(-2px);

}

/*=========================
Responsive
=========================*/

@media(max-width:900px){

.forgot-page{

    grid-template-columns:1fr;

}

.forgot-left{

    display:none;

}

.forgot-right{

    padding:20px;

}

.forgot-form{

    padding:30px;

}

}
</style>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<section class="forgot-page">

    <!-- Left Side -->

    <div class="forgot-left">

        <div class="left-content">

            <h1>Zindagi <span style="color: #FFD54F;">Asan</span></h1>

            <h2>Reset Your Password</h2>

            <p>

                Don't worry! Enter your registered email
                and create a new password to access your account again.

            </p>

        </div>

    </div>

    <!-- Right Side -->

    <div class="forgot-right">

        <form class="forgot-form">

            <a href="customer.login.html" class="back-btn">

                <i class="fa-solid fa-arrow-left"></i>

                Back to Login

            </a>

            <h2>Forgot Password</h2>

            <p class="forgot-text">

                Please enter your details.

            </p>

            <!-- Email -->

            <div class="input-box">

                <label>Email Address</label>

                <div class="input-field">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

                </div>

            </div>

            <!-- New Password -->

            <div class="input-box">

                <label>New Password</label>

                <div class="input-field">

                    <i class="fa-solid fa-lock"></i>

                    <input
                    type="password"
                    id="password"
                    placeholder="Enter new password"
                    required>

                    <i class="fa-solid fa-eye"
                    id="togglePassword"></i>

                </div>

            </div>

            <!-- Confirm Password -->

            <div class="input-box">

                <label>Confirm Password</label>

                <div class="input-field">

                    <i class="fa-solid fa-lock"></i>

                    <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm password"
                    required>

                </div>

            </div>

            <button
            type="submit"
            class="reset-btn">

                Reset Password

            </button>

        </form>

    </div>

</section>

<script> 
    /*=========================================
      ZINDAGI ASAN
      FORGOT PASSWORD JS
=========================================*/

document.addEventListener("DOMContentLoaded", function () {

    // ==========================
    // Elements
    // ==========================

    const form = document.querySelector(".forgot-form");

    const email = document.getElementById("email");

    const password = document.getElementById("password");

    const confirmPassword = document.getElementById("confirmPassword");

    const togglePassword = document.getElementById("togglePassword");

    // ==========================
    // Show / Hide Password
    // ==========================

    togglePassword.addEventListener("click", function () {

        if(password.type === "password"){

            password.type = "text";

            this.classList.remove("fa-eye");

            this.classList.add("fa-eye-slash");

        }

        else{

            password.type = "password";

            this.classList.remove("fa-eye-slash");

            this.classList.add("fa-eye");

        }

    });

    // ==========================
    // Form Submit
    // ==========================

    form.addEventListener("submit", function(e){

        e.preventDefault();

        // Email Check

        if(email.value.trim() === ""){

            alert("Please enter your email.");

            return;

        }

        // Password Length

        if(password.value.length < 8){

            alert("Password must be at least 8 characters.");

            return;

        }

        // Confirm Password

        if(password.value !== confirmPassword.value){

            alert("Passwords do not match.");

            return;

        }

        // Success

        alert("Password Reset Successfully!");

        window.location.href="customer.html";

    });

});
</script>

</body>

</html>
