<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Profile</title>

<style>
    /* =========================
   EDIT PROFILE CSS
========================= */


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    background:#f5f7fb;

}



/* Header */

header{

    height:70px;

    background:#2a9085;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 50px;

    color:white;

}



.logo{

    font-size:28px;

    font-weight:bold;

}



header a{

    color:white;

    text-decoration:none;

    font-size:16px;

}


header a:hover{

    color:#ffe082;

}




/* Profile Page */


.profile-page{

    width:100%;

    min-height:80vh;

    display:flex;

    flex-direction:column;

    align-items:center;

    padding:40px 0;

}



.profile-page h1{

    font-size:35px;

    color:#333;

    margin-bottom:10px;

}



.profile-page p{

    color:#777;

    margin-bottom:30px;

}





/* Profile Box */


.profile-box{

    width:420px;

    background:white;

    padding:35px;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,0.1);

}




/* Profile Icon */

.profile-image{

    width:100px;

    height:100px;

    border-radius:50%;

    background:#e8f5f3;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:55px;

    margin:auto;

}





/* Upload Button */


.upload-btn{

    display:block;

    margin:15px auto 25px;

    background:#ddd;

    border:none;

    padding:10px 20px;

    border-radius:20px;

    cursor:pointer;

}





/* Labels */


.profile-box label{

    display:block;

    margin-top:15px;

    color:#333;

}





/* Inputs */


.profile-box input{

    width:100%;

    padding:12px;

    margin-top:8px;

    border:1px solid #ddd;

    border-radius:8px;

    outline:none;

}



.profile-box input:focus{

    border-color:#2a9085;

}




/* Save Button */


#saveProfile{

    width:100%;

    margin-top:25px;

    padding:12px;

    border:none;

    border-radius:25px;

    background:#2a9085;

    color:white;

    font-size:16px;

    cursor:pointer;

}



#saveProfile:hover{

    background:#21756d;

}




/* Mobile */

@media(max-width:500px){

    .profile-box{

        width:90%;

    }


    header{

        padding:0 20px;

    }

}
</style>

</head>


<body>


<header>

    <div class="logo">
        Zindagi <span style="color: #FFD54F;">Asan</span>
    </div>


    <a href="provider-setting.html">
        ← Back
    </a>

</header>




<section class="profile-page">


    <h1>Edit Profile</h1>

    <p>
        Update your personal information
    </p>



    <div class="profile-box">


        <div class="profile-image">

            👤

        </div>



        <button class="upload-btn">
            Change Picture
        </button>



        <label>
            Full Name
        </label>

        <input 
        type="text" 
        id="name"
        placeholder="Enter your name">



        <label>
            Email
        </label>

        <input 
        type="email"
        id="email"
        placeholder="Enter your email">



        <label>
            Phone Number
        </label>

        <input 
        type="text"
        id="phone"
        placeholder="Enter your phone number">



        <label>
            Address
        </label>

        <input 
        type="text"
        id="address"
        placeholder="Enter your address">



        <button id="saveProfile">
            Save Changes
        </button>


    </div>



</section>



<script>
/* =========================
   EDIT PROFILE JS
========================= */


let saveProfile = document.getElementById("saveProfile");


saveProfile.addEventListener("click", function(){


    let name = document.getElementById("name").value;

    let email = document.getElementById("email").value;

    let phone = document.getElementById("phone").value;

    let address = document.getElementById("address").value;



    if(name === "" || email === "" || phone === "" || address === ""){


        alert("Please fill all profile details");


    }

    else{


        alert("Profile updated successfully!");


        window.location.href = "provider-setting.html";


    }


});
</script>


</body>

</html>
